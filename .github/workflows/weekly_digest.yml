name: Weekly News Digest

on:
  schedule:
    # Every Friday at 08:00 UTC
    - cron: "0 8 * * 5"
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NewsAgent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit memory update
        if: success()
        run: |
          git config user.name "NewsAgent Bot"
          git config user.email "newsagent@github.com"
          git add memory/history.json
          git diff --staged --quiet || (git commit -m "Update digest memory [skip ci]" && git push)

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: newsagent-log
          path: |
            newsagent.log
            digest_*.html
          retention-days: 7
