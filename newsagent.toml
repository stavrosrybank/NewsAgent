# NewsAgent User Configuration
# Edit this file freely — no Python code changes needed.
# Changes take effect on the next run.

# ---------------------------------------------------------------------------
# Editorial Focus
# Sent to Claude when selecting the best article per category.
# ---------------------------------------------------------------------------
[editorial]
focus = """
Reader profile: based in Berlin, with family in Sweden and Greece.

- Prefer European news with direct relevance to Germany, Sweden, or Greece.
- Local Berlin news is always welcome.
- Deprioritise US domestic politics unless it has clear European consequences.
- Deprioritise celebrity or pure entertainment news.
- News related to AI, tech is always welcome.
"""

# ---------------------------------------------------------------------------
# Digest settings
# ---------------------------------------------------------------------------
[digest]
lookback_days = 7
summary_words = 80   # target word count per story summary

# ---------------------------------------------------------------------------
# Story slots — one article per slot, selected by Claude.
#
# Fields:
#   category          — display name shown in the email (required)
#   count             — number of stories for this category (default 1)
#   description       — plain-English guidance for Claude's article selection
#   preferred_sources — Claude MUST pick from these sources when available
#
# To add a category: copy a [[digest.slots]] block and fill in the fields.
# To remove a category: delete its [[digest.slots]] block.
# ---------------------------------------------------------------------------

[[digest.slots]]
category = "Global News"
count = 3
description = "Major world events, international politics, military conflict, diplomacy"
preferred_sources = ["reuters"]

[[digest.slots]]
category = "Germany"
count = 3
description = "German politics, economy, society — national German stories"
preferred_sources = ["DeutscheWelle", "reuters"]

[[digest.slots]]
category = "Berlin"
count = 3
description = "Berlin city politics, local events, stories specific to Berlin"
preferred_sources = ["rbb24","BerlinerZeitung","DeutscheWelle"]

[[digest.slots]]
category = "Sweden"
count = 3
description = "Swedish news and affairs"
preferred_sources = ["SvD", "reuters"]

[[digest.slots]]
category = "Greece"
count = 3
description = "Greek news and affairs"
preferred_sources = ["reuters"]

[[digest.slots]]
category = "Science & Tech"
count = 3
description = "AI, science breakthroughs, technology, space, medicine"
preferred_sources = ["reuters"]

[[digest.slots]]
category = "Culture & Sports"
count = 3
description = "Arts, culture, sports, lifestyle, entertainment"
preferred_sources = ["reuters"]

[[digest.slots]]
category = "Business & Finance"
count = 3
description = "Big news in finance, startups, economy"
preferred_sources = ["reuters"]

[[digest.slots]]
category = "Football"
count = 3
description = "Big news in Football (soccer), especially involving my favorite teams Hammarby, AEK athens, FC Union"
