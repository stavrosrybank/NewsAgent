# NewsAgent User Configuration
# Edit this file freely — no Python code changes needed.
# Changes take effect on the next run.

# ---------------------------------------------------------------------------
# Editorial Focus
# This text is sent directly to Claude when it scores stories for importance.
# Write in plain English. Be as specific or general as you like.
# ---------------------------------------------------------------------------
[editorial]
focus = """
Reader profile: based in Berlin, with family in Sweden and Greece.

Geographic priorities:
- Global stories with major international impact always come first.
- Give strong weight to European news — especially stories directly relevant
  to Germany, Greece, or Sweden.
- Local Berlin news are also interesting.
- UK, French, and broader EU political/economic news is of interest.
- Scandinavian stories (Sweden, Norway, Denmark) are welcome.

==> In total it would be great to have at least include a top Global story (maybe 2-3 if there was a busy week). And also include the top story from Greece, Sweden and Berlin. The the another 5 stories should be a mix of whatever has been top priority based on the conditions above.

What to deprioritize:
- US domestic political news (party politics, congressional procedure, culture
  war debates) unless it has clear, significant consequences for Europe or the
  wider world (e.g. trade tariffs affecting EU, US military posture changes,
  major economic policy shifts with global spillover).
- Celebrity or entertainment news.
- Too specific news from countries that are not Germany, Sweden, Greece, or Berlin related.

Aim for a balanced digest: roughly half global/geopolitical, half
European/regional, across the 10 stories.
"""

# ---------------------------------------------------------------------------
# Digest settings
# ---------------------------------------------------------------------------
[digest]
top_n_stories      = 10
lookback_days      = 7
summary_paragraphs = 1   # 1 = brief digest, 2-3 = medium, 4 = detailed

# Guaranteed slots: always include the top story from each of these sources,
# even if it wouldn't otherwise rank in the top 10.
# Remaining slots are filled with the highest-scoring stories globally.
guaranteed_sources = ["Spiegel", "Ekathimerini", "TheLocalSweden"]
